{% if S_TOPICTRANSLATESINGLE_ACTIVE %}
<div class="gtranslate-footer-credit">
    <a href="https://gtranslate.io" target="_blank" rel="nofollow" class="gt-badge">
        <span class="gt-text">{{ lang('TOPIC_TRANSLATE_POWERED') }} </span>
        <span style="margin-left:5px;font-weight:bold;font-size:14px;">
            <span class="gt-g">G</span><span class="gt-o1">o</span><span class="gt-o2">o</span>
            <span class="gt-g">g</span><span class="gt-l">l</span><span class="gt-e">e</span>
            <span style="color:#676767;">Translate</span>
        </span>
    </a>
</div>

<script>
(function () {
"use strict";

const ORIGINAL_POST_HTML = new Map();
const LAST_LANGUAGE_KEY = 'topictranslatesingle_last_language';

window.gtranslateSettings = {
    default_language: "{{ GTRANSLATE_DEFAULT_LANGUAGE|default('auto') }}",
    native_language_names: {{ GTRANSLATE_NATIVE_NAMES ? 'true' : 'false' }},
    detect_browser_language: {{ GTRANSLATE_DETECT_BROWSER ? 'true' : 'false' }},
    languages: {{ GTRANSLATE_LANGUAGES_JSON|raw|default('["en"]') }},
    wrapper_selector: ".gtranslate_wrapper",
    switcher_horizontal_position: "inline",
    flag_size: 16
};

const dLang = window.gtranslateSettings.default_language;

function limparCookies() {
    const d = window.location.hostname;

    ["googtrans", "googtrans_ext"].forEach(c => {
        document.cookie = `${c}=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/;`;
        document.cookie = `${c}=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/;domain=${d};`;
    });
}

function getKey(el) {
    if (!el.dataset.gtId) {
        el.dataset.gtId = "gt_" + Math.random().toString(36).substr(2, 9);
    }
    return el.dataset.gtId;
}

function salvarOriginal(el) {
    if (!el) {
        return;
    }

    const key = getKey(el);

    if (!ORIGINAL_POST_HTML.has(key)) {
        ORIGINAL_POST_HTML.set(key, el.innerHTML);
    }
}

function restaurarTudo(exceto) {
    document.querySelectorAll('.content, .post-content-area, .post-body, .post-content').forEach(el => {
        const key = getKey(el);

        if (exceto && key === getKey(exceto)) {
            return;
        }

        if (ORIGINAL_POST_HTML.has(key)) {
            el.innerHTML = ORIGINAL_POST_HTML.get(key);
        }

        el.classList.add('notranslate');
        el.setAttribute('translate', 'no');
    });
}

function getLastLanguage() {
    try {
        return localStorage.getItem(LAST_LANGUAGE_KEY) || '';
    } catch (e) {
        return '';
    }
}

function setLastLanguage(language) {
    try {
        if (language) {
            localStorage.setItem(LAST_LANGUAGE_KEY, language);
        }
    } catch (e) {}
}

function clearActiveButtons() {
    document.querySelectorAll('.btn-translate-custom.is-active').forEach(btn => btn.classList.remove('is-active'));
}

function updateTranslatedState(activeButton) {
    document.querySelectorAll('.btn-translate-custom.is-translated').forEach(btn => {
        if (!activeButton || btn !== activeButton) {
            btn.classList.remove('is-translated');
        }
    });

    if (activeButton) {
        activeButton.classList.add('is-translated');
    }
}

function hideAllWrappers() {
    document.querySelectorAll('.gtranslate_wrapper').forEach(w => {
        w.style.display = 'none';
    });
    clearActiveButtons();
}

function createLastLanguageAction(wrapper) {
    if (wrapper.querySelector('.gt-last-language')) {
        return;
    }

    const lastLanguage = getLastLanguage();
    if (!lastLanguage || lastLanguage === dLang || lastLanguage === 'auto') {
        return;
    }

    const action = document.createElement('button');
    action.type = 'button';
    action.className = 'gt-last-language';
    action.textContent = "{{ lang('TOPIC_TRANSLATE_USE_LAST') }}";
    action.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();

        const sel = wrapper.querySelector('select');
        if (!sel) {
            return;
        }

        sel.value = dLang + '|' + lastLanguage;
        sel.dispatchEvent(new Event('change', { bubbles: true }));
    });

    wrapper.appendChild(action);
}

function prepareWrapper(wrapper) {
    if (!wrapper) {
        return;
    }

    if (!wrapper.querySelector('.gt_label_translate')) {
        const label = document.createElement('div');
        label.className = 'gt_label_translate gt-box';
        label.textContent = "{{ lang('TRANSLATE') }}";
        wrapper.prepend(label);
    }

    createLastLanguageAction(wrapper);
}

window.resetarTradutor = function () {
    limparCookies();
    restaurarTudo();
    hideAllWrappers();
    updateTranslatedState(null);

    const sel = document.querySelector('select.gt_selector');
    if (sel) {
        sel.value = dLang + '|' + dLang;
    }

    if (document.cookie.includes('googtrans')) {
        location.reload();
    }
};

window.abrirTradutor = function (btn) {
    const wrapper = btn.parentNode.querySelector('.gtranslate_wrapper');
    const isOpen = wrapper && wrapper.style.display === 'block';

    if (isOpen) {
        hideAllWrappers();
        return;
    }

    hideAllWrappers();

    const postArea = btn.closest('.postbody, .post, article, .panel-body, .inner')?.querySelector('.content, .post-content-area, .post-body, .post-content');

    if (postArea) {
        salvarOriginal(postArea);
        restaurarTudo(postArea);
        postArea.classList.remove('notranslate');
        postArea.setAttribute('translate', 'yes');
    }

    if (!wrapper) {
        return;
    }

    prepareWrapper(wrapper);
    wrapper.style.display = 'block';
    wrapper.onclick = e => e.stopPropagation();
    btn.classList.add('is-active');

    setTimeout(() => {
        const sel = wrapper.querySelector('select');

        createLastLanguageAction(wrapper);

        if (!sel) {
            return;
        }

        try {
            sel.focus();
        } catch (e) {}

        if (sel.dataset.gtBound === '1') {
            return;
        }

        sel.dataset.gtBound = '1';
        sel.addEventListener('change', function () {
            const value = this.value || '';
            const lang = value.indexOf('|') !== -1 ? value.split('|')[1] : '';

            if (lang && lang !== dLang && lang !== 'auto') {
                setLastLanguage(lang);
                updateTranslatedState(btn);
            }

            if (lang === dLang || lang === 'auto') {
                window.resetarTradutor();
                return;
            }

            setTimeout(() => {
                wrapper.style.display = 'none';
                btn.classList.remove('is-active');
            }, 400);
        });
    }, 300);
};

function initTranslate() {
    document.querySelectorAll('.btn-translate-custom').forEach(btn => {
        if (btn.dataset.gtBind) {
            return;
        }

        btn.dataset.gtBind = '1';
        btn.setAttribute('aria-expanded', 'false');

        btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            window.abrirTradutor(this);
            this.setAttribute('aria-expanded', this.classList.contains('is-active') ? 'true' : 'false');
        });
    });

    document.querySelectorAll('.content, .post-content-area, .post-body, .post-content').forEach(salvarOriginal);
    document.querySelectorAll('.gtranslate_wrapper').forEach(prepareWrapper);
}

document.addEventListener('DOMContentLoaded', initTranslate);
document.addEventListener('click', function (e) {
    if (e.target.closest('.translate-container')) {
        return;
    }
    hideAllWrappers();
});

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
        hideAllWrappers();
    }
});

document.addEventListener('click', () => setTimeout(initTranslate, 500));

})();
</script>
<script src="https://cdn.gtranslate.net/widgets/latest/dwf.js" defer></script>
{% endif %}
